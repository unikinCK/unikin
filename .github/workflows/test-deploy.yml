name: Test & Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check
        run: python -m compileall -q .

      - name: Run tests (if available)
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests/ directory found - skipping pytest run."
          fi

  deploy:
    name: Deploy (Test Environment)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build deployment bundle
        run: |
          mkdir -p dist
          tar -czf dist/unikin-${{ github.sha }}.tar.gz \
            README.md requirements.txt unikin.py mcp_server.py mcp_client.py

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: unikin-test-deploy-${{ github.sha }}
          path: dist/*.tar.gz
